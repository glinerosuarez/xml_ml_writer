plugins {
    id 'java'
    id 'application'
}

group = 'main.java.ingestion'
version = '1.0.0'

sourceCompatibility = '17'

repositories {
    mavenCentral()
}

dependencies {
    implementation 'com.marklogic:marklogic-client-api:5.5.4'
    implementation 'com.moandjiezana.toml:toml4j:0.7.2'
}

application {
    mainClass = 'main.java.ingestion.App'
}